name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: macOS 应用
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 构建并测试
        run: |
          xcodebuild \
            -project ZFStatMenus.xcodeproj \
            -scheme ZFStatMenus \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            test

  worker:
    name: Cloudflare Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm test
